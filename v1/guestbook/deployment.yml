apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  labels:
    app: guestbook

spec:
  replicas: 1
  selector:
    matchLabels:
      app: guestbook

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  template:
    metadata:
      labels:
        app: guestbook

    spec:
      containers:
      - name: guestbook
        image: us.icr.io/sn-labs-harinesivaku/guestbook:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: 50m
          requests:
            cpu: 20m
